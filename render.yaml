services:
  - type: web
    name: dapi-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_DIR
        value: /tmp/logs
      - key: UPLOAD_FOLDER
        value: /tmp/uploads/certificates
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false   # Paste your service account JSON here in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: "python"
